<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{

    width:320px;
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 20px rgba(0,0,0,.2);
    text-align:center;
    position:relative;

}

.top{

    height:140px;
    background:#3d6df5;

}

.profile{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white;

    position:absolute;
    top:75px;
    left:50%;
    transform:translateX(-50%);
}

.content{

    padding-top:70px;
    padding-bottom:25px;

}

.content h2{

    margin-bottom:5px;

}

.content p{

    color:#555;
    margin-bottom:20px;

}

.social{

    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:20px;

}

.social a{

    width:40px;
    height:40px;
    border-radius:50%;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    text-decoration:none;

}

.social a:nth-child(1){background:#1877F2;}
.social a:nth-child(2){background:#1DA1F2;}
.social a:nth-child(3){background:#E1306C;}
.social a:nth-child(4){background:#FF0000;}

.buttons{

    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:25px;

}

button{

    border:none;
    background:#3d6df5;
    color:white;
    padding:10px 25px;
    border-radius:25px;
    cursor:pointer;
    font-size:15px;

}

button:hover{

    background:#204ccf;

}

.stats{

    display:flex;
    justify-content:space-around;
    color:#555;
    font-size:15px;
