<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@100..900&display=swap');

        body {
            font-family: "Bitcount Prop Single", system-ui;
            font-optical-sizing: auto;
            background-color: rgb(25, 25, 40);
            color: rgb(184, 184, 241);
            height: 70vh;
            display: flex;
            justify-content: center;      
            align-items: center;
        }
        h1{
            font-weight: 200;
            font-size: 38px;
            text-align: center;
            text-shadow: 0 0 10px rgb(126, 126, 240), 0 0 20px rgb(126, 126, 240), 0 0 40px rgb(126, 126, 240);
            transition: all 0.3s ease-in-out;
            cursor: pointer;
        }
        h1:hover{
            transform: scale(1.2);
        }
    </style>
</head>

<body>
    <h1>Hello, hover me  :)</h1>
</body>

</html>
